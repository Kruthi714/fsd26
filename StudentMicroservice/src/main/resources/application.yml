spring:
  application:
    name: StudentMicroservice
  web:
    error:
      whitelabel:
        enabled: false
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:file:./testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

eureka:
  client:
    service-url:
      default-zone: http://localhost:8761/eureka/

server:
  port: 2222
